title: My GitHub Pages Blog
description: A simple blog hosted on GitHub Pages
author: Your Name
email: your-email@example.com

# Theme - choose one from https://pages.github.com/themes/
theme: hacker

# Build settings
markdown: kramdown
highlighter: rouge

# Permalink style for posts
permalink: /:year/:month/:day/:title/

# Plugins (safe for GitHub Pages)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation links (optional)
header_pages:
  - about.md
